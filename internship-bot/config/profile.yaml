# Ipshita's search profile. Edit this to retune what the bot looks for.
# No personal contact info lives here — the Telegram chat id is a secret, not config.

person:
  name: Ipshita
  headline: >-
    MBA in Sustainability Management @ IIFM Bhopal (2025-2027);
    B.Com (Hons) Finance @ BHU. ESG/GHG data analyst experience, Power BI.

target:
  timeframe: "Winter internship (approx Nov 2026 - Jan 2027) and final MBA placement"
  domains: [Sustainability, ESG, Climate, Finance]
  roles:
    - ESG Analyst
    - Sustainability Analyst / Consultant
    - ESG Data Analyst
    - GHG / Carbon Accounting Analyst
    - Sustainability / BRSR / GRI Reporting Analyst
    - Finance Analyst / FP&A
    - Sustainable Finance / ESG Investing
    - ESG Equity / Investment Research
  locations: [India, Remote, Hybrid (India)]
  level: [Internship, MBA Summer/Winter Internship, Entry-level, Graduate/Fresher]

# Her real strengths — used to explain "why this fits" and to score relevance.
skills:
  - ESG data analysis
  - GHG inventory / carbon accounting
  - Sustainability reporting (BRSR/GRI/ESG disclosures)
  - Power BI
  - Excel / Google Sheets
  - Financial analysis

# Keywords used for board searches and fit scoring. Keep them broad-ish.
keywords:
  - ESG
  - sustainability
  - climate
  - carbon
  - GHG
  - BRSR
  - decarbonization
  - finance
  - investment
  - analyst
  - internship

# Free-text context handed to the model. This is where the OFF-RESUME internship goes.
notes:
  - "Extra sustainability internship (the 'SI' one) not listed on the resume — TODO: add the company name and a one-line description here so the bot can weigh it."
  - "B.Com Finance background makes her a credible fit for finance and sustainable-finance roles, not only pure sustainability."
  - "Prefers India-based or remote roles."

# --- Digest assembly ---
digest:
  per_source_min: 3    # always include at least the top 3 from each source (never skipped)
  max_items: 30        # generous overall cap; the top-3-per-source guarantee always holds

# --- Job-board sources (real APIs, no fragile scraping) ---
sources:
  # Remotive: free public JSON API. One request per search term.
  remotive_searches:
    - ESG
    - sustainability
    - finance analyst
    - data analyst
  # Adzuna: free API with genuine India coverage. Needs ADZUNA_APP_ID / ADZUNA_APP_KEY
  # secrets (get them free at developer.adzuna.com). Skipped automatically if unset.
  adzuna_country: in            # two-letter country code; "in" = India
  adzuna_searches:
    - ESG analyst
    - sustainability
    - finance analyst
    - ESG intern
  # The Muse: free public API (no key). Categories are from The Muse's fixed list.
  the_muse_categories:
    - Data and Analytics
    - Finance
    - Business Operations
  the_muse_location: India
  # Jobicy: free remote-jobs API (no key).
  jobicy_tags:
    - finance
    - data-science
  # --- Per-company career pages (clean public APIs; no keys needed) ---
  # These are HIGH-signal but per-company: fill them with HER target employers.
  # Any token that doesn't resolve just logs and is skipped (sources are isolated).

  # Greenhouse: token from a careers URL like boards.greenhouse.io/<token>
  greenhouse_companies:
    - watershed        # verified valid; add HER target companies' tokens here
  # Lever: token from jobs.lever.co/<token>
  lever_companies: []
  # Ashby: org from jobs.ashbyhq.com/<org>
  ashby_orgs: []
  # Unstop (Indian internships/jobs/competitions) — no tokens; uses search terms above.
  unstop_types:
    - jobs
    - internships
  # Workday (big enterprises). From a careers URL like
  # https://<tenant>.wd5.myworkdayjobs.com/en-US/<site>  ->
  #   { host: "<tenant>.wd5.myworkdayjobs.com", tenant: "<tenant>", site: "<site>" }
  workday_boards: []

# --- Tavily web search (LLM-grade search API; free tier) ---
# The "grounding-style" source: real current listings from across the web
# (Internshala / LinkedIn / Naukri / company pages) with real links.
tavily:
  # Runs daily. Each query = 1 credit; free tier = 1000/month.
  # 5 job queries + 1 reddit query ≈ 180 credits/month.
  max_queries_per_run: 5       # job-search queries per run
  max_results: 6
  include_domains: []          # empty = whole web; or restrict to job sites
  queries:
    - ESG analyst internship India 2026
    - sustainability internship India apply
    - finance internship MBA India 2026
    - BRSR ESG reporting analyst fresher India
    - sustainable finance internship India
  # A focused Reddit search via Tavily (Reddit blocks CI IPs). ~1 credit.
  reddit_queries:
    - (ESG OR sustainability OR finance) internship OR hiring India

# --- Reddit (public JSON API, no key) ---
reddit:
  subreddits:
    - climatejobs
    - GreenJobs
    - sustainability
    - FinancialCareers
    - Internships
    - forhire
  # A post must mention at least one of these to count as relevant.
  keywords:
    - ESG
    - sustainab
    - climate
    - carbon
    - finance
    - analyst
    - intern
    - hiring
  max_age_days: 12
  max_items: 5

# --- Networking: curated LinkedIn search deep-links (no scraping, no fake people) ---
networking:
  linkedin_location: India
  # Each becomes a LinkedIn people-search link she can open and send requests from.
  linkedin_people_searches:
    - ESG analyst recruiter India
    - sustainability talent acquisition India
    - ESG consulting hiring India
    - sustainable finance recruiter India
    - IIFM Bhopal sustainability
  # Keywords for LinkedIn *jobs* deep-links (internship + entry filters applied).
  linkedin_job_searches:
    - ESG analyst
    - sustainability analyst
    - finance analyst
  max_links: 6
